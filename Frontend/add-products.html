        const logBox = document.getElementById('logBox');
        
        function parseProducts() {
            const lines = rawText.split('\n');
            let currentCategory = 'Pantry';
            const products = [];

            lines.forEach(line => {
                line = line.trim();
                if (line.startsWith('## ')) {
                    const cat = line.toLowerCase();
                    if (cat.includes('bakery')) currentCategory = 'Bakery';
                    else if (cat.includes('dairy')) currentCategory = 'Dairy';
                    else if (cat.includes('fruits')) currentCategory = 'Fruits'; 
                    else if (cat.includes('staples')) currentCategory = 'Pantry';
                    else if (cat.includes('oils')) currentCategory = 'Pantry';
                    else if (cat.includes('snacks')) currentCategory = 'Snacks';
                    else if (cat.includes('beverages')) currentCategory = 'Beverages';
                } else if (line.match(/^\d+\.\s+(.+)$/)) {
                    let name = line.match(/^\d+\.\s+(.+)$/)[1].trim();
                    let cat = currentCategory;
                    
                    // Specific logic for veggies since they share the markdown section with Fruits
                    const lowerName = name.toLowerCase();
                    if (cat === 'Fruits' && (lowerName.includes('potato') || lowerName.includes('onion') || lowerName.includes('tomato') || lowerName.includes('carrot') || lowerName.includes('cucumber') || lowerName.includes('pepper') || lowerName.includes('capsicum') || lowerName.includes('broccoli') || lowerName.includes('cauliflower') || lowerName.includes('spinach') || lowerName.includes('lettuce') || lowerName.includes('mushroom') || lowerName.includes('garlic') || lowerName.includes('ginger') || lowerName.includes('chilies') || lowerName.includes('corn') || lowerName.includes('zucchini') || lowerName.includes('avocado') || lowerName.includes('coriander'))) {
                        cat = 'Vegetables';
                    }
                    
                    // Generate a nice placehold.co image URL 
                    // Using a short 2-3 word abbreviation so the text fits nicely on the image
                    const shortName = name.split(' ').slice(0, 2).join(' ');
                    const imgUrl = `https://placehold.co/400x400/e2e8f0/0f172a?text=${encodeURIComponent(shortName)}`;
                    
                    products.push({
                        name: name,
                        category: cat,
                        price: Math.floor(Math.random() * 400) + 25, // Random price between ₹25 and ₹425
                        image: imgUrl,
                        description: "Premium quality " + name + " directly from our trusted suppliers.",
                        unit: '1 pack',
                        stock: Math.floor(Math.random() * 50) + 10 // Random stock between 10 and 60
                    });
                }
            });
            return products;
        }

        async function processImport() {
            try {
                const newProducts = parseProducts();
                logBox.innerHTML += `Parsed ${newProducts.length} items from your list.<br><br>`;
                
                // Fetch existing to avoid duplicates
                logBox.innerHTML += `Fetching existing products from database...<br>`;
                const snap = await getDocs(collection(db, 'products'));
                const existingNames = new Set(snap.docs.map(doc => doc.data().name.toLowerCase()));
                
                logBox.innerHTML += `Found ${existingNames.size} existing products. Cross-referencing...<br><br>`;
                
                let addedCount = 0;
                let skippedCount = 0;

                for (let prod of newProducts) {
                    if (existingNames.has(prod.name.toLowerCase())) {
                        logBox.innerHTML += `<span class="skip">⏭ Skipped: ${prod.name} (Already exists)</span><br>`;
                        skippedCount++;
                    } else {
                        await addDoc(collection(db, 'products'), prod);
                        logBox.innerHTML += `<span class="success">✔ Added: ${prod.name}</span><br>`;
                        addedCount++;
                    }
                    // Small scroll to bottom trick
                    logBox.scrollTop = logBox.scrollHeight;
                }
                
                logBox.innerHTML += `<br><strong style="color:#10b981;">Complete! Added ${addedCount} new items. Skipped ${skippedCount} duplicates.</strong><br>`;
                logBox.innerHTML += `<br><strong>You can safely close this tab now and view your updated storefront!</strong>`;
            } catch (err) {
                logBox.innerHTML += `<span class="error">✖ Fatal Error: ${err.message}</span><br>`;
            }
        }

        // Start automatically
        setTimeout(processImport, 1000);
