        // ═══════════════════════════════════════════════════════════
        // STEP 2: Wikipedia API functions
        // ═══════════════════════════════════════════════════════════

        function findWikiTitle(productName) {
            const lower = productName.toLowerCase();
            for (let entry of keywordToWiki) {
                if (lower.includes(entry.kw)) {
                    return entry.wiki;
                }
            }
            return null;
        }

        async function fetchWikiImage(wikiTitle) {
            try {
                const url = `https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(wikiTitle)}&prop=pageimages&format=json&pithumbsize=400&origin=*`;
                const resp = await fetch(url);
                const data = await resp.json();
                const pages = data.query.pages;
                const pageId = Object.keys(pages)[0];
                
                if (pageId === '-1' || !pages[pageId].thumbnail) {
                    return null;
                }
                return pages[pageId].thumbnail.source;
            } catch (err) {
                return null;
            }
        }

        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // ═══════════════════════════════════════════════════════════
        // STEP 3: Process all products
        // ═══════════════════════════════════════════════════════════

        async function processAll() {
            log('Fetching all products from database...', 'info');
            const snap = await getDocs(collection(db, 'products'));
            const total = snap.docs.length;
            log(`Found ${total} products. Starting image fetch...`, 'info');
            log('─'.repeat(50));

            let updatedCount = 0;
            let failedCount = 0;
            let i = 0;

            for (let document of snap.docs) {
                i++;
                const product = document.data();
                const name = product.name;
                const progress = `[${i}/${total}]`;

                // Find the Wikipedia article
                const wikiTitle = findWikiTitle(name);
                
                if (!wikiTitle) {
                    log(`${progress} <span class="warn">⚠ No mapping for: ${name}</span>`);
                    failedCount++;
                    continue;
                }

                // Fetch the image from Wikipedia
                const imageUrl = await fetchWikiImage(wikiTitle);
                
                if (imageUrl) {
                    await updateDoc(doc(db, 'products', document.id), { image: imageUrl });
                    log(`${progress} <span class="success">✔ ${name}</span> <span class="info">← ${wikiTitle}</span>`);
                    updatedCount++;
                } else {
                    log(`${progress} <span class="warn">⚠ No image on Wikipedia for: ${name} (tried "${wikiTitle}")</span>`);
                    failedCount++;
                }

                // Rate limit: 300ms between requests
                await delay(300);
            }

            log('─'.repeat(50));
            log(`<strong style="color:#10b981;">✅ Complete!</strong>`);
            log(`<strong>Updated: ${updatedCount} | No image found: ${failedCount}</strong>`);
            log(`<br>Refresh your storefront to see the changes!`);
        }

        setTimeout(processAll, 1000);
    </script>
