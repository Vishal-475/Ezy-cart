        const logBox = document.getElementById('logBox');
        
        function parseProducts() {
            const lines = rawText.split('\n');
            
            // Map subcategories to our primary categories
            let currentCategory = 'Pantry'; // Default for flours, rice, dals, oils, spices
            
            const skipLines = [
                'Regional & Millet Flours', 'Rice Varieties', 'Split Dals', 'Whole Grams & Beans',
                'Oils & Desi Ghee', 'Kitchen Staples', 'Whole Spices', 'Powdered Spices',
                'Authentic Spice Blends (Masalas)', 'Traditional Pickles (Achar)',
                'Accompaniments & Papads', 'Pastes & Cooking Bases', 'Traditional Breakfast Batters',
                'Indian Dairy Essentials', 'Savory Namkeen', 'Indian Biscuits & Tea-Time Snacks',
                'Instant Chaat Kits', 'Packaged Sweets (Mithai)', 'Instant Dessert Mixes',
                'Teas & Coffees (Chai & Filter Coffee)', 'Traditional Syrups & Cold Beverages'
            ];

            const products = [];

            lines.forEach(line => {
                line = line.trim();
                if (!line) return;
                
                // Check if it's a major header or sub-header
                if (
                    line.includes('(241 - 270)') ||
                    line.includes('(271 - 315)') ||
                    line.includes('(316 - 345)') ||
                    line.includes('(346 - 385)') ||
                    line.includes('(386 - 420)') ||
                    skipLines.includes(line)
                ) {
                    if (line.includes('Pulses, Dals')) currentCategory = 'Pantry';
                    else if (line.includes('Indian Spices')) currentCategory = 'Pantry';
                    else if (line.includes('Pickles, Chutneys')) currentCategory = 'Pantry';
                    else if (line.includes('Traditional Snacks')) currentCategory = 'Snacks';
                    else if (line.includes('Indian Sweets & Beverages')) currentCategory = 'Beverages';
                    return; // Skip adding this line as a product
                }
                
                // Must be a product!
                let name = line;
                
                // Exception for dairy items that ended up here
                let cat = currentCategory;
                if (name.toLowerCase().includes('paneer') || name.toLowerCase().includes('butter') || name.toLowerCase().includes('curd') || name.toLowerCase().includes('mawa')) {
                    cat = 'Dairy';
                }
                if (name.toLowerCase().includes('sweets') || name.toLowerCase().includes('halwa') || name.toLowerCase().includes('jalebi') || name.toLowerCase().includes('laddoo') || name.toLowerCase().includes('jamun') || name.toLowerCase().includes('peda') || name.toLowerCase().includes('papdi') || name.toLowerCase().includes('katli')) {
                    cat = 'Snacks'; // Using Snacks for sweets
                }
                if (name.toLowerCase().includes('coffee') || name.toLowerCase().includes('tea ') || name.toLowerCase().includes('drink') || name.toLowerCase().includes('syrup') || name.toLowerCase().includes('soda')) {
                    cat = 'Beverages';
                }

                // Clean up the name for the image
                const shortName = name.split('/')[0].split('(')[0].trim().split(' ').slice(0, 2).join(' ');
                const imgUrl = `https://placehold.co/400x400/e2e8f0/0f172a?text=${encodeURIComponent(shortName)}`;
                
                products.push({
                    name: name,
                    category: cat,
                    price: Math.floor(Math.random() * 400) + 40,
                    image: imgUrl,
                    description: "Authentic premium quality " + name.split('(')[0].trim(),
                    unit: '1 pack',
                    stock: Math.floor(Math.random() * 50) + 10
                });
            });
            return products;
        }

        async function processImport() {
            try {
                const newProducts = parseProducts();
                logBox.innerHTML += `Parsed ${newProducts.length} authentic Indian grocery items.<br><br>`;
                
                logBox.innerHTML += `Fetching existing products from database...<br>`;
                const snap = await getDocs(collection(db, 'products'));
                const existingNames = new Set(snap.docs.map(doc => doc.data().name.toLowerCase()));
                
                let addedCount = 0;
                let skippedCount = 0;

                for (let prod of newProducts) {
                    if (existingNames.has(prod.name.toLowerCase())) {
                        logBox.innerHTML += `<span class="skip">⏭ Skipped: ${prod.name} (Already exists)</span><br>`;
                        skippedCount++;
                    } else {
                        await addDoc(collection(db, 'products'), prod);
                        logBox.innerHTML += `<span class="success">✔ Added: ${prod.name}</span><br>`;
                        addedCount++;
                    }
                    logBox.scrollTop = logBox.scrollHeight;
                }
                
                logBox.innerHTML += `<br><strong style="color:#10b981;">Complete! Added ${addedCount} new items. Skipped ${skippedCount} duplicates.</strong><br>`;
            } catch (err) {
                logBox.innerHTML += `<span class="error">✖ Fatal Error: ${err.message}</span><br>`;
            }
        }

        setTimeout(processImport, 1000);
