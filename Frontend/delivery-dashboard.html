<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delivery Dashboard | EzyCart</title>
  <link rel="stylesheet" href="styles/style.css">
  <script src="scripts/theme.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { background: var(--bg-color); color: var(--text-color); font-family: system-ui, sans-serif; }
    header { background: var(--card-bg); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); box-shadow: var(--shadow); position: sticky; top: 0; z-index: 100; }
    header h1 { font-size: 1.2rem; margin: 0; display: flex; align-items: center; gap: 10px; color: var(--primary-color); }
    .btn-logout { background: transparent; color: #ef4444; border: 1px solid #ef4444; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
    
    .container { max-width: 600px; margin: 0 auto; padding: 20px; }
    .welcome-text { font-size: 1.5rem; margin-bottom: 20px; font-weight: 600; }
    
    .order-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 15px;
      box-shadow: var(--shadow);
    }
    .order-header { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
    .order-id { font-weight: bold; color: var(--primary-color); }
    .order-amount { font-weight: bold; }
    
    .order-details p { margin: 5px 0; color: var(--text-muted); font-size: 0.9rem; }
    .order-details strong { color: var(--text-color); }
    
    .actions { margin-top: 15px; display: flex; gap: 10px; }
    .btn-action {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      font-size: 0.9rem;
    }
    .btn-call { background: #e0e7ff; color: #4f46e5; }
    .btn-map { background: #fef08a; color: #854d0e; }
    .btn-deliver { background: var(--primary-color); color: white; width: 100%; margin-top: 10px; }
    
    .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }
    .empty-state i { font-size: 3rem; margin-bottom: 15px; color: var(--border-color); }
  </style>
  <link rel="manifest" href="manifest.json">`n</head>
<body>

  <header>
    <h1><i class="fas fa-motorcycle"></i> Delivery Portal</h1>
    <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
  </header>

  <div class="container">
    <div class="welcome-text" id="welcomeMsg">Loading...</div>
    
    <div id="ordersContainer">
      <div style="text-align: center; padding: 40px;"><i class="fas fa-spinner fa-spin fa-2x"></i></div>
    </div>
  </div>

  <script type="module">
    import { db, collection, getDocs, doc, getDoc, query, where, orderBy } from './scripts/firebase-config.js';
    import { updateOrder } from './scripts/orders-api.js';

    const workerId = localStorage.getItem('deliveryWorkerId');
    if (!workerId) {
      window.location.href = 'delivery-login.html';
    }

    window.logout = function() {
      localStorage.removeItem('deliveryWorkerId');
      window.location.href = 'delivery-login.html';
    }

    async function loadDashboard() {
      try {
        // Get Worker Details
        const workerSnap = await getDoc(doc(db, 'workers', workerId));
        if (workerSnap.exists()) {
          document.getElementById('welcomeMsg').textContent = `Hello, ${workerSnap.data().name}!`;
        }

        // Get Assigned Orders
        const ordersCol = collection(db, 'orders');
        const q = query(ordersCol, where('assignedWorker', '==', workerId));
        const snapshot = await getDocs(q);
        
        let orders = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        // Filter out delivered or cancelled
        orders = orders.filter(o => o.orderStatus !== 'delivered' && o.orderStatus !== 'cancelled');

        const container = document.getElementById('ordersContainer');
        container.innerHTML = '';

        if (orders.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <i class="fas fa-box-open"></i>
              <h3>No pending deliveries!</h3>
              <p>You have no active orders assigned to you right now.</p>
            </div>
          `;
          return;
        }

        orders.forEach(order => {
          const div = document.createElement('div');
          div.className = 'order-card';
          
          const phoneClean = order.customerPhone ? order.customerPhone.replace(/\D/g, '') : '';
          
          div.innerHTML = `
            <div class="order-header">
              <span class="order-id">${order.invoiceNumber}</span>
              <span class="order-amount">₹${parseFloat(order.total).toFixed(2)}</span>
            </div>
            <div class="order-details">
              <p><strong>Customer:</strong> ${order.customerName}</p>
              <p><strong>Phone:</strong> ${order.customerPhone || 'N/A'}</p>
              <p><strong>Payment:</strong> ${order.paymentMethod.toUpperCase()}</p>
              <p style="margin-top: 10px;"><strong>Address:</strong><br>${order.shippingAddress}</p>
            </div>
            
            <div class="actions">
              ${phoneClean ? `<a href="tel:${phoneClean}" class="btn-action btn-call"><i class="fas fa-phone"></i> Call</a>` : ''}
              <a href="https://maps.google.com/?q=${encodeURIComponent(order.shippingAddress)}" target="_blank" class="btn-action btn-map"><i class="fas fa-map-marker-alt"></i> Map</a>
            </div>
            <button class="btn-action btn-deliver" onclick="window.markDelivered('${order.id}')">
              <i class="fas fa-check-circle"></i> Mark as Delivered
            </button>
          `;
          container.appendChild(div);
        });

      } catch (err) {
        console.error("Error loading dashboard", err);
        document.getElementById('ordersContainer').innerHTML = '<p style="color:red;text-align:center;">Failed to load orders.</p>';
      }
    }

    window.markDelivered = async function(orderId) {
      if (confirm("Are you sure this order has been successfully delivered to the customer?")) {
        const btn = event.currentTarget;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Updating...';
        btn.disabled = true;

        const res = await updateOrder(orderId, { orderStatus: 'delivered' });
        if (res.success) {
          loadDashboard();
        } else {
          alert("Failed to update order status. Please try again.");
          btn.innerHTML = '<i class="fas fa-check-circle"></i> Mark as Delivered';
          btn.disabled = false;
        }
      }
    }

    loadDashboard();
  </script>
</body>
</html>
