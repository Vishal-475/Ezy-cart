<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EzyCart - Admin Dashboard</title>
  <link rel="stylesheet" href="styles/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    .dashboard-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      padding: 40px;
    }
    .stat-card {
      background: #f8f9fa;
      padding: 30px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .stat-card h3 { margin-bottom: 15px; color: #333; }
    .stat-card .count { font-size: 2.5rem; color: #42b83e; font-weight: bold; }
    .action-btn { margin-top: 20px; padding: 10px 20px; background: #42b83e; color: white; border: none; border-radius: 5px; cursor: pointer; }
    .action-btn:hover { background: #369c32; }
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <div class="container" style="display:flex; justify-content:space-between; align-items:center;">
      <h1 style="color:white; margin:0;">EzyCart Admin</h1>
      <nav>
        <ul style="list-style:none; display:flex; gap:15px; margin:0; padding:0;">
          <li><a href="admin.html" style="color:white; text-decoration:none;">Dashboard</a></li>
          <li><a href="products.html" style="color:white; text-decoration:none;">Products</a></li>
          <li><a href="orders.html" style="color:white; text-decoration:none;">Orders</a></li>
          <li><a href="customers.html" style="color:white; text-decoration:none;">Customers</a></li>
          <li><a href="workers.html" style="color:white; text-decoration:none;">Workers</a></li>
          <li><a href="attendance.html" style="color:white; text-decoration:none;">Attendance</a></li>
          <li><button onclick="logoutAdmin()" style="background:red; color:white; border:none; padding:5px 10px; border-radius:3px; cursor:pointer;">Logout</button></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <h2 style="text-align: center; margin-top: 40px;">System Overview</h2>
    <div class="dashboard-stats">
      <div class="stat-card">
        <h3>Total Products</h3>
        <div class="count" id="product-count">...</div>
        <button class="action-btn" onclick="location.href='products.html'">Manage Products</button>
      </div>
      <div class="stat-card">
        <h3>Total Orders</h3>
        <div class="count" id="order-count">...</div>
        <button class="action-btn" onclick="location.href='orders.html'">View Orders</button>
      </div>
      <div class="stat-card">
        <h3>Registered Customers</h3>
        <div class="count" id="customer-count">...</div>
        <button class="action-btn" onclick="location.href='customers.html'">View Customers</button>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer style="text-align:center; padding:20px; background:#1f2e20; color:white; position:fixed; bottom:0; width:100%;">
    <p>&copy; 2024 EzyCart Admin Panel. All rights reserved.</p>
  </footer>

  <script type="module">
    import { auth, onAuthStateChanged, signOut, db, collection, getDocs } from './scripts/firebase-config.js';
    import { getUserRole } from './scripts/auth.js';

    async function loadStats() {
      try {
        const prodSnap = await getDocs(collection(db, 'products'));
        document.getElementById('product-count').textContent = prodSnap.docs.filter(d => d.data().isActive !== false).length;

        const orderSnap = await getDocs(collection(db, 'orders'));
        document.getElementById('order-count').textContent = orderSnap.docs.length;

        const userSnap = await getDocs(collection(db, 'users'));
        document.getElementById('customer-count').textContent = userSnap.docs.filter(d => d.data().role !== 'admin').length;
      } catch (e) {
        console.error("Error loading stats", e);
      }
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = 'login.html';
        return;
      }
      const role = await getUserRole(user.uid);
      if (role !== 'admin') {
        alert("Access denied. Admins only.");
        window.location.href = 'index.html';
      } else {
        loadStats();
      }
    });

    window.logoutAdmin = async function() {
      await signOut(auth);
      window.location.href = 'login.html';
    };
  </script>
</body>
</html>
