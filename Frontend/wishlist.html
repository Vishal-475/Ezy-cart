<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EzyCart — My Wishlist | THE DAILY BASKET</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="icon" href="assets/logo/cart.png">
    <script src="scripts/theme.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .wishlist-empty {
            text-align: center;
            padding: 64px 24px;
        }

        .wishlist-empty .icon-wrap {
            width: 80px;
            height: 80px;
            border-radius: var(--radius-full);
            background: var(--accent-light);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 2rem;
            color: var(--danger);
        }

        .wishlist-empty h3 {
            font-size: 1.2rem;
            margin-bottom: 8px;
        }

        .wishlist-empty p {
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        .category-item button {
            width: 100%;
            margin-top: 12px;
        }
        
        .category-item.just-added {
            animation: addPulse 0.3s ease;
        }
        
        @keyframes addPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }
    </style>
  <link rel="manifest" href="manifest.json">
</head>
<body>
    <header>
        <h1>EzyCart</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="categories.html">Categories</a>
            <a href="wishlist.html" class="active" id="wishlist-link"><i class="fas fa-heart"></i> <span id="wishlist-count" class="cart-badge" style="background: var(--danger); display: none;">0</span></a>
            <a href="cart.html">Cart <span id="cart-count" class="cart-badge">0</span></a>
            <a href="checkout.html">Checkout</a>
            <a href="my-orders.html" id="orders-link" style="display:none;">My Orders</a>
            <a href="login.html" id="auth-link">Login</a>
        </nav>
    </header>

    <main>
        <h2><i class="fas fa-heart" style="color: var(--danger); margin-right: 8px;"></i>My Wishlist</h2>

        <div id="empty-state" class="wishlist-empty" style="display: none;">
            <div class="icon-wrap"><i class="far fa-heart"></i></div>
            <h3>Your wishlist is empty</h3>
            <p>Save items you love by clicking the heart icon on any product.</p>
            <button class="btn-lg" onclick="location.href='categories.html'">
                <i class="fas fa-store"></i> Browse Products
            </button>
        </div>

        <div class="category-grid" id="wishlist-container">
            <!-- Dynamic -->
        </div>
    </main>

    <footer>
        <p>&copy; 2024 EzyCart THE DAILY BASKET. All rights reserved.</p>
    </footer>

    <script type="module">
        import { getWishlist, toggleWishlist, updateWishlistBadge } from './scripts/wishlist-manager.js';
        import { addToCart, updateCartBadge } from './scripts/cart-manager.js';
        import { auth, onAuthStateChanged, signOut } from './scripts/firebase-config.js';
        import { getUserRole } from './scripts/auth.js';

        function renderWishlist() {
            const container = document.getElementById('wishlist-container');
            const emptyState = document.getElementById('empty-state');
            const items = getWishlist();

            container.innerHTML = '';

            if (items.length === 0) {
                container.style.display = 'none';
                emptyState.style.display = 'block';
            } else {
                container.style.display = 'grid';
                emptyState.style.display = 'none';

                items.forEach(p => {
                    const item = document.createElement('div');
                    item.className = 'category-item';
                    
                    item.onclick = (e) => {
                        if(e.target.closest('button')) return;
                        window.location.href = `product.html?id=${p.id}`;
                    };

                    item.innerHTML = `
                        <button class="wishlist-btn" onclick="window.handleWishlistRemove('${p.id}', this)" style="position: absolute; top: 12px; right: 12px; background: transparent; border: none; font-size: 1.5rem; color: var(--danger); cursor: pointer; padding: 0; width: auto; margin: 0; z-index: 2;">
                            <i class="fas fa-times-circle"></i>
                        </button>
                        <img src="${p.image || 'assets/img/default.png'}" alt="${p.name}" style="height: 150px; object-fit: contain;">
                        <h3>${p.name}</h3>
                        <p style="color: var(--accent); font-weight: 600; font-size: 1rem;">₹${p.price.toFixed(2)}</p>
                        <button onclick="window.handleAddToCart('${p.name.replace(/'/g, "\\'")}', ${p.price}, this)">
                            <i class="fas fa-cart-plus"></i> Add to Cart
                        </button>
                    `;
                    container.appendChild(item);
                });
            }
            updateWishlistBadge();
            updateCartBadge();
        }

        window.handleAddToCart = function(name, price, btnEl) {
            addToCart(name, price);
            const card = btnEl.closest('.category-item');
            if (card) {
                card.classList.add('just-added');
                setTimeout(() => card.classList.remove('just-added'), 350);
            }
        };

        window.handleWishlistRemove = function(id, btnEl) {
            const items = getWishlist();
            const product = items.find(i => i.id === id);
            if (product) {
                toggleWishlist(product);
                renderWishlist(); // Re-render to remove from DOM
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            renderWishlist();

            const authLink = document.getElementById('auth-link');
            if (authLink) {
                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        const role = await getUserRole(user.uid);
                        if (role === 'admin') {
                            authLink.innerHTML = '<i class="fas fa-tachometer-alt"></i> Admin';
                            authLink.href = 'admin.html';
                        } else {
                            const ordersLink = document.getElementById('orders-link');
                            if (ordersLink) ordersLink.style.display = 'inline';
                            
                            authLink.innerHTML = '<i class="fas fa-sign-out-alt"></i> Logout';
                            authLink.href = '#';
                            authLink.onclick = async (e) => {
                                e.preventDefault();
                                await signOut(auth);
                                window.location.reload();
                            };
                        }
                    } else {
                        authLink.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                        authLink.href = 'login.html';
                        authLink.onclick = null;
                    }
                });
            }
        });
    </script>
</body>
</html>
