<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EzyCart THE DAILY BASKET - Categories</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="icon" href="/assets/logo/cart.png">
    <style>
        .filter-bar {
            padding: 20px;
            text-align: center;
            background: #fff;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .filter-bar input, .filter-bar select {
            padding: 10px;
            margin: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 1rem;
        }
        .loader {
            text-align: center;
            font-size: 1.2rem;
            padding: 50px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Categories</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="categories.html">Categories</a>
            <a href="cart.html">Cart <span id="cart-count" class="cart-badge">0</span></a>
            <a href="checkout.html">Checkout</a>
            <a href="login.html" id="auth-link">Login</a>
        </nav>
    </header>

    <main>
        <div class="filter-bar">
            <input type="text" id="searchBar" placeholder="Search products...">
            <select id="categoryFilter">
                <option value="">All Categories</option>
                <option value="Fruits & Vegetables">Fruits & Vegetables</option>
                <option value="Dairy/Fresh Meats & Seafood">Dairy/Fresh Meats & Seafood</option>
                <option value="Snacks">Snacks</option>
                <option value="Beverages">Beverages</option>
            </select>
        </div>

        <section>
            <h2 id="category-title">All Products</h2>
            <div id="loader" class="loader">Loading products...</div>
            <div class="category-grid" id="products-container">
                <!-- Products will be loaded here dynamically -->
            </div>
            <br>
            <button onclick="window.location.href='cart.html'" style="display:block; margin: 0 auto;">View Cart</button>
        </section>
    </main>
    
    <footer>
        <p>&copy; 2024 SVMG THE DAILY BASKET. All rights reserved.</p>
    </footer>

    <script type="module">
        import { getAllProducts } from './scripts/products-api.js';
        import { addToCart, updateCartBadge } from './scripts/cart-manager.js';
        import { auth, onAuthStateChanged, signOut } from './scripts/firebase-config.js';
        import { getUserRole } from './scripts/auth.js';

        let allProducts = [];

        async function init() {
            const container = document.getElementById('products-container');
            const loader = document.getElementById('loader');
            
            try {
                // For now, if Firebase is not connected or products are empty, it will show an empty list.
                allProducts = await getAllProducts();
                loader.style.display = 'none';
                renderProducts(allProducts);
            } catch (e) {
                loader.textContent = 'Error loading products. Please configure Firebase.';
                console.error(e);
            }

            document.getElementById('searchBar').addEventListener('input', handleFilter);
            document.getElementById('categoryFilter').addEventListener('change', handleFilter);
            updateCartBadge();

            // Handle Auth Link
            const authLink = document.getElementById('auth-link');
            if (authLink) {
                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        const role = await getUserRole(user.uid);
                        if (role === 'admin') {
                            authLink.innerHTML = 'Admin Panel';
                            authLink.href = 'admin.html';
                        } else {
                            authLink.innerHTML = 'Logout';
                            authLink.href = '#';
                            authLink.onclick = async (e) => {
                                e.preventDefault();
                                await signOut(auth);
                                window.location.reload();
                            };
                        }
                    } else {
                        authLink.innerHTML = 'Login';
                        authLink.href = 'login.html';
                        authLink.onclick = null;
                    }
                });
            }
        }

        function handleFilter() {
            const searchTerm = document.getElementById('searchBar').value.toLowerCase();
            const category = document.getElementById('categoryFilter').value;
            
            let filtered = allProducts;
            if (category) {
                filtered = filtered.filter(p => p.category === category);
                document.getElementById('category-title').textContent = category;
            } else {
                document.getElementById('category-title').textContent = 'All Products';
            }
            if (searchTerm) {
                filtered = filtered.filter(p => p.name.toLowerCase().includes(searchTerm));
            }
            renderProducts(filtered);
        }

        function renderProducts(products) {
            const container = document.getElementById('products-container');
            container.innerHTML = '';
            
            if (products.length === 0) {
                container.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">No products found.</p>';
                return;
            }

            products.forEach(p => {
                const item = document.createElement('div');
                item.className = 'category-item';
                item.innerHTML = `
                    <img src="${p.image || '/assets/img/default.png'}" alt="${p.name}" width="150px" style="height: 150px; object-fit: contain;">
                    <h3>${p.name}</h3>
                    <p>₹${p.price.toFixed(2)} / ${p.unit || 'item'}</p>
                    <button onclick="window.handleAddToCart('${p.name}', ${p.price})">Add to Cart</button>
                `;
                container.appendChild(item);
            });
        }

        window.handleAddToCart = function(name, price) {
            addToCart(name, price);
        };

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
