<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EzyCart — Browse Products | THE DAILY BASKET</title>
    <meta name="description" content="Browse fresh groceries by category at EzyCart THE DAILY BASKET. Fruits, vegetables, dairy, beverages and snacks.">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="icon" href="assets/logo/cart.png">
    <script src="scripts/theme.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .category-item button {
            width: 100%;
            margin-top: 12px;
        }

        .product-count {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 20px;
        }

        /* Add-to-cart animation feedback */
        @keyframes addPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        .category-item.just-added {
            animation: addPulse 0.3s ease;
        }
    </style>
  <link rel="manifest" href="manifest.json">`n</head>
<body>
    <header>
        <h1>EzyCart</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="categories.html" class="active">Categories</a>
            <a href="wishlist.html" id="wishlist-link"><i class="fas fa-heart"></i> <span id="wishlist-count" class="cart-badge" style="background: var(--danger); display: none;">0</span></a>
            <a href="cart.html">Cart <span id="cart-count" class="cart-badge">0</span></a>
            <a href="checkout.html">Checkout</a>
            <a href="my-orders.html" id="orders-link" style="display:none;">My Orders</a>
            <a href="login.html" id="auth-link">Login</a>
        </nav>
    </header>

    <main>
        <h2><i class="fas fa-th-large" style="color: var(--accent); margin-right: 8px;"></i>Browse Products</h2>

        <!-- Filter Bar -->
        <div class="filter-bar">
            <div style="position: relative; flex: 1; min-width: 200px;">
                <i class="fas fa-search" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none;"></i>
                <input type="text" id="searchBar" placeholder="Search products..." style="padding-left: 40px; width: 100%;">
            </div>
            <select id="categoryFilter">
                <option value="">All Categories</option>
                <option value="Vegetables">Vegetables</option>
                <option value="Fruits">Fruits</option>
                <option value="Dairy & Eggs">Dairy & Eggs</option>
                <option value="Meats & Seafood">Meats & Seafood</option>
                <option value="Snacks">Snacks</option>
                <option value="Beverages">Beverages</option>
                <option value="Pantry Staples">Pantry Staples</option>
            </select>
            <select id="sortFilter">
                <option value="default">Sort by: Featured</option>
                <option value="price-asc">Price: Low to High</option>
                <option value="price-desc">Price: High to Low</option>
                <option value="name-asc">Name: A to Z</option>
                <option value="name-desc">Name: Z to A</option>
            </select>
        </div>

        <p class="product-count" id="product-count-text"></p>

        <div id="loader" class="loader"><i class="fas fa-spinner fa-spin"></i> Loading products...</div>

        <div class="category-grid" id="products-container">
            <!-- Products loaded dynamically -->
        </div>

        <div style="text-align: center; margin-top: 32px;">
            <button class="btn-lg" onclick="window.location.href='cart.html'">
                <i class="fas fa-shopping-cart"></i> View Cart
            </button>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 EzyCart THE DAILY BASKET. All rights reserved.</p>
    </footer>

    <script type="module">
        import { getAllProducts } from './scripts/products-api.js';
        import { addToCart, updateCartBadge } from './scripts/cart-manager.js';
        import { toggleWishlist, isInWishlist, updateWishlistBadge, setWishlistUser } from './scripts/wishlist-manager.js';
        import { auth, onAuthStateChanged, signOut } from './scripts/firebase-config.js';
        import { getUserRole } from './scripts/auth.js';

        let allProducts = [];

        async function init() {
            const container = document.getElementById('products-container');
            const loader = document.getElementById('loader');
            
            try {
                allProducts = await getAllProducts();
                loader.style.display = 'none';
                renderProducts(allProducts);
            } catch (e) {
                loader.innerHTML = '<i class="fas fa-exclamation-triangle" style="color: var(--danger);"></i> Error loading products. Please check your connection.';
                console.error(e);
            }

            // Read ?search= query param from URL (for global search bar)
            const urlParams = new URLSearchParams(window.location.search);
            const searchQuery = urlParams.get('search');
            if (searchQuery) {
                document.getElementById('searchBar').value = searchQuery;
                handleFilter();
            }

            document.getElementById('searchBar').addEventListener('input', handleFilter);
            document.getElementById('categoryFilter').addEventListener('change', handleFilter);
            document.getElementById('sortFilter').addEventListener('change', handleFilter);
            updateCartBadge();
            updateWishlistBadge();

            // Handle Auth Link
            const authLink = document.getElementById('auth-link');
            if (authLink) {
                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        setWishlistUser(user.uid);
                        renderProducts(allProducts); // re-render to update heart icons

                        const role = await getUserRole(user.uid);
                        if (role === 'admin') {
                            authLink.innerHTML = '<i class="fas fa-tachometer-alt"></i> Admin';
                            authLink.href = 'admin.html';
                        } else {
                            const ordersLink = document.getElementById('orders-link');
                            if (ordersLink) ordersLink.style.display = 'inline';
                            
                            authLink.innerHTML = '<i class="fas fa-sign-out-alt"></i> Logout';
                            authLink.href = '#';
                            authLink.onclick = async (e) => {
                                e.preventDefault();
                                await signOut(auth);
                                window.location.reload();
                            };
                        }
                    } else {
                        setWishlistUser('guest');
                        renderProducts(allProducts);

                        authLink.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                        authLink.href = 'login.html';
                        authLink.onclick = null;
                    }
                });
            }
        }

        function handleFilter() {
            const searchTerm = document.getElementById('searchBar').value.toLowerCase();
            const category = document.getElementById('categoryFilter').value;
            const sortVal = document.getElementById('sortFilter').value;
            
            let filtered = [...allProducts]; // clone array for sorting
            
            if (category) {
                filtered = filtered.filter(p => p.category === category);
            }
            if (searchTerm) {
                filtered = filtered.filter(p => p.name.toLowerCase().includes(searchTerm));
            }

            // Apply Sorting
            if (sortVal === 'price-asc') {
                filtered.sort((a, b) => a.price - b.price);
            } else if (sortVal === 'price-desc') {
                filtered.sort((a, b) => b.price - a.price);
            } else if (sortVal === 'name-asc') {
                filtered.sort((a, b) => a.name.localeCompare(b.name));
            } else if (sortVal === 'name-desc') {
                filtered.sort((a, b) => b.name.localeCompare(a.name));
            }

            renderProducts(filtered);
        }

        function renderProducts(products) {
            const container = document.getElementById('products-container');
            const countText = document.getElementById('product-count-text');
            container.innerHTML = '';
            
            countText.textContent = `${products.length} product${products.length !== 1 ? 's' : ''} found`;

            if (products.length === 0) {
                container.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 48px 0;"><i class="fas fa-search" style="font-size: 2rem; display: block; margin-bottom: 12px;"></i>No products found matching your search.</p>';
                return;
            }

            products.forEach(p => {
                const item = document.createElement('div');
                item.className = 'category-item';
                item.id = `product-${p.name.replace(/\s+/g, '-').toLowerCase()}`;
                
                // Clicking the card goes to details page
                item.onclick = (e) => {
                    // Don't navigate if clicking the add to cart button
                    if(e.target.closest('button')) return;
                    window.location.href = `product.html?id=${p.id}`;
                };

                
                const heartColor = isInWishlist(p.id) ? 'var(--danger)' : 'var(--border-color)';
                const heartClass = isInWishlist(p.id) ? 'fas' : 'far';

                item.innerHTML = `
                    <button class="wishlist-btn" onclick="window.handleWishlistToggle('${p.id}', '${p.name.replace(/'/g, "\\'")}', ${p.price}, '${p.image || ''}', this)" style="position: absolute; top: 12px; right: 12px; background: transparent; border: none; font-size: 1.5rem; color: ${heartColor}; cursor: pointer; padding: 0; width: auto; margin: 0; z-index: 2;">
                        <i class="${heartClass} fa-heart"></i>
                    </button>
                    <img src="${p.image || 'assets/img/default.png'}" alt="${p.name}" style="height: 150px; object-fit: contain;">
                    <h3>${p.name}</h3>
                    <p style="color: var(--accent); font-weight: 600; font-size: 1rem;">₹${p.price.toFixed(2)} <span style="color: var(--text-muted); font-weight: 400; font-size: 0.8rem;">/ ${p.unit || 'item'}</span></p>
                    <button onclick="window.handleAddToCart('${p.name.replace(/'/g, "\\'")}', ${p.price}, this)">
                        <i class="fas fa-cart-plus"></i> Add to Cart
                    </button>
                `;
                container.appendChild(item);
            });
        }

        window.handleAddToCart = function(name, price, btnEl) {
            addToCart(name, price);
            // Visual feedback
            const card = btnEl.closest('.category-item');
            if (card) {
                card.classList.add('just-added');
                setTimeout(() => card.classList.remove('just-added'), 350);
            }
        };

        window.handleWishlistToggle = function(id, name, price, image, btnEl) {
            const added = toggleWishlist({ id, name, price, image });
            const icon = btnEl.querySelector('i');
            if (added) {
                icon.classList.remove('far');
                icon.classList.add('fas');
                btnEl.style.color = 'var(--danger)';
            } else {
                icon.classList.remove('fas');
                icon.classList.add('far');
                btnEl.style.color = 'var(--border-color)';
            }
        };

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
