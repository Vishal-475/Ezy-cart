<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fix Product Images</title>
    <style>
        body { font-family: system-ui; padding: 40px; background: #0f172a; color: #fff; text-align: center; }
        .log { margin-top: 20px; background: #1e293b; padding: 20px; border-radius: 8px; text-align: left; max-height: 400px; overflow-y: auto; font-family: monospace; }
        .success { color: #10b981; }
    </style>
</head>
<body>
    <h1>Fixing Broken Images...</h1>
    <div class="log" id="logBox">Starting image fix process...<br></div>

    <script type="module">
        import { db, collection, getDocs, doc, updateDoc } from './scripts/firebase-config.js';

        // Reliable image replacements
        const imageFixes = {
            'Premium Butter': 'https://images.unsplash.com/photo-1589985270826-4b7bb135bc9d?w=500&q=80',
            '100% Orange Juice': 'https://images.unsplash.com/photo-1600271886742-f049cd451b51?w=500&q=80',
            'Sparkling Mineral Water': 'https://images.unsplash.com/photo-1548839140-29a749e1bc4e?w=500&q=80',
            // Adding a few fallbacks just in case others failed
            'Sweet Watermelon': 'https://images.unsplash.com/photo-1582281298055-e25b84a30b0b?w=500&q=80',
            'Atlantic Salmon Fillet': 'https://images.unsplash.com/photo-1485921325833-c519f76c4927?w=500&q=80'
        };

        const logBox = document.getElementById('logBox');

        async function fixImages() {
            try {
                const snap = await getDocs(collection(db, 'products'));
                let updatedCount = 0;
                
                for (let document of snap.docs) {
                    const product = document.data();
                    if (imageFixes[product.name]) {
                        await updateDoc(doc(db, 'products', document.id), {
                            image: imageFixes[product.name]
                        });
                        logBox.innerHTML += `<span class="success">✔ Fixed image for ${product.name}</span><br>`;
                        updatedCount++;
                    }
                }
                
                logBox.innerHTML += `<br><strong style="color:#10b981;">Done! Fixed ${updatedCount} products. You can now close this tab.</strong>`;
            } catch (err) {
                logBox.innerHTML += `<span style="color:#ef4444;">✖ Error: ${err.message}</span><br>`;
            }
        }

        setTimeout(fixImages, 500);
    </script>
</body>
</html>
