<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EzyCart - Promo Codes</title>
  <link rel="stylesheet" href="styles/styles.css">
  <script src="scripts/theme.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    .admin-container {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
    }
    .card {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 8px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
      border: 1px solid var(--card-border);
      color: var(--text-color);
    }
    .form-group {
      margin-bottom: 15px;
    }
    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    .form-group input {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--card-border);
      border-radius: 4px;
      background: var(--bg-color);
      color: var(--text-color);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      color: var(--text-color);
    }
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid var(--card-border);
    }
    th {
      background: rgba(16, 185, 129, 0.1);
    }
    .btn-submit {
      padding: 10px 20px;
      background: var(--primary-color);
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .btn-submit:hover {
      background: var(--secondary-color);
    }
    .btn-delete {
      padding: 6px 12px;
      background: #ef4444;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
  </style>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <header>
    <div class="container" style="display:flex; justify-content:space-between; align-items:center;">
      <h1 style="color:white; margin:0;">EzyCart Admin</h1>
      <nav>
        <ul style="list-style:none; display:flex; gap:15px; margin:0; padding:0;">
          <li><a href="admin.html" style="color:white; text-decoration:none;">Dashboard</a></li>
          <li><a href="products.html" style="color:white; text-decoration:none;">Products</a></li>
          <li><a href="orders.html" style="color:white; text-decoration:none;">Orders</a></li>
          <li><a href="customers.html" style="color:white; text-decoration:none;">Customers</a></li>
          <li><a href="promocodes.html" style="color:white; font-weight:bold; text-decoration:underline;">Promo Codes</a></li>
          <li><button onclick="logoutAdmin()" style="background:red; color:white; border:none; padding:5px 10px; border-radius:3px; cursor:pointer;">Logout</button></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="admin-container">
    <h2>Manage Promo Codes</h2>

    <div class="card">
      <h3>Create New Promo Code</h3>
      <form id="promoForm">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
          <div class="form-group">
            <label>Promo Code (e.g., SAVE20)</label>
            <input type="text" id="promoCode" required style="text-transform: uppercase;">
          </div>
          <div class="form-group">
            <label>Discount Percentage (%)</label>
            <input type="number" id="promoDiscount" min="1" max="100" required>
          </div>
        </div>
        <button type="submit" class="btn-submit">Add Promo Code</button>
      </form>
    </div>

    <div class="card">
      <h3>Active Promo Codes</h3>
      <table>
        <thead>
          <tr>
            <th>Code</th>
            <th>Discount</th>
            <th>Created At</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="promoTableBody">
          <!-- Dynamic rows -->
        </tbody>
      </table>
    </div>
  </main>

  <script type="module">
    import { auth, onAuthStateChanged, signOut, db, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy } from './scripts/firebase-config.js';
    import { getUserRole } from './scripts/auth.js';
    import { showToast } from './scripts/toast.js';

    let promoCodes = [];

    async function loadPromos() {
      const q = query(collection(db, 'promocodes'), orderBy('createdAt', 'desc'));
      const snap = await getDocs(q);
      promoCodes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderPromos();
    }

    function renderPromos() {
      const tbody = document.getElementById('promoTableBody');
      tbody.innerHTML = '';
      if (promoCodes.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">No promo codes found</td></tr>';
        return;
      }

      promoCodes.forEach(promo => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td style="font-weight:bold; color:var(--primary-color);">${promo.code}</td>
          <td>${promo.discount}% Off</td>
          <td>${new Date(promo.createdAt).toLocaleDateString()}</td>
          <td>
            <button class="btn-delete" onclick="window.deletePromo('${promo.id}')">Delete</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    document.getElementById('promoForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const codeInput = document.getElementById('promoCode');
      const discountInput = document.getElementById('promoDiscount');
      const code = codeInput.value.trim().toUpperCase();
      const discount = parseInt(discountInput.value);

      if(promoCodes.some(p => p.code === code)) {
          showToast('Promo code already exists!', 'error');
          return;
      }

      try {
        await addDoc(collection(db, 'promocodes'), {
          code,
          discount,
          createdAt: new Date().toISOString()
        });
        showToast('Promo code added successfully', 'success');
        codeInput.value = '';
        discountInput.value = '';
        loadPromos();
      } catch(err) {
        console.error(err);
        showToast('Error adding promo code', 'error');
      }
    });

    window.deletePromo = async function(id) {
      if(confirm('Are you sure you want to delete this promo code?')) {
        try {
          await deleteDoc(doc(db, 'promocodes', id));
          showToast('Promo code deleted', 'info');
          loadPromos();
        } catch(err) {
          console.error(err);
          showToast('Error deleting promo code', 'error');
        }
      }
    };

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = 'login.html';
        return;
      }
      const role = await getUserRole(user.uid);
      if (role !== 'admin') {
        showToast("Access denied. Admins only.", "error");
        setTimeout(() => { window.location.href = 'index.html'; }, 1000);
      } else {
        loadPromos();
      }
    });

    window.logoutAdmin = async function() {
      await signOut(auth);
      window.location.href = 'login.html';
    };
  </script>
</body>
</html>
